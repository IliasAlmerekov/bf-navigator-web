#:schema https://developers.openai.com/codex/config-schema.json

approval_policy = "never"
sandbox_mode = "workspace-write"
web_search = "live"

[features]
multi_agent = true

[mcp_servers.context7]
command = "npx"
args = ["-y", "@upstash/context7-mcp@latest"]

[mcp_servers.sequential-thinking]
command = "npx"
args = ["-y", "@modelcontextprotocol/server-sequential-thinking"]

[agents]
max_threads = 7
max_depth = 2

[agents.researcher]
description = "Read-only repository researcher for ticket discovery and evidence gathering."
config_file = "agents/researcher.toml"

[agents.coder]
description = "Primary write-enabled implementation agent for Expo/React Native feature work."
config_file = "agents/coder.toml"

[agents.reviewer]
description = "Read-only reviewer focused on correctness, regressions, and convention alignment."
config_file = "agents/reviewer.toml"

[agents.tester]
description = "Verification agent for automated checks and manual test matrices."
config_file = "agents/tester.toml"

[agents.security]
description = "Read-only security and resilience reviewer for mobile feature changes."
config_file = "agents/security.toml"

[agents.architect]
description = "Read-only planner for decomposition, boundaries, and implementation sequencing."
config_file = "agents/architect.toml"

[agents.explorer]
description = "Fast read-only code explorer for execution paths and affected modules."
config_file = "agents/explorer.toml"
