name: PR Checks

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CI: true
  HUSKY: 0
  NODE_VERSION: 22

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Run ESLint
        run: npm run lint

      - name: Run Stylelint
        run: npm run lint:css

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:ci

  dependency-audit:
    name: dependency-audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm audit --audit-level=high

  secrets:
    name: secrets
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        uses: trufflesecurity/trufflehog@main
        with:
          extra_args: --results=verified,unknown

  prompt-security:
    name: prompt-security
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect prompt scan readiness
        id: detect
        run: |
          set -euo pipefail

          has_prompt_config=false
          for file in .promptfoo-code-scan.yaml .promptfoo-code-scan.yml promptfooconfig.yaml promptfooconfig.yml; do
            if [ -f "$file" ]; then
              has_prompt_config=true
              break
            fi
          done

          has_prompt_assets=false
          for dir in prompts src/prompts; do
            if [ -d "$dir" ]; then
              has_prompt_assets=true
              break
            fi
          done

          has_llm_sdk=false
          if grep -Eq '"(@anthropic-ai/sdk|anthropic|openai|langchain|@langchain/[^"]+|@azure/openai|@google/genai|@google/generative-ai|cohere-ai|ollama|mistralai)"' package.json; then
            has_llm_sdk=true
          fi

          echo "has_prompt_config=$has_prompt_config" >> "$GITHUB_OUTPUT"
          echo "has_prompt_assets=$has_prompt_assets" >> "$GITHUB_OUTPUT"
          echo "has_llm_sdk=$has_llm_sdk" >> "$GITHUB_OUTPUT"

      - name: Skip when no LLM surface exists
        if: steps.detect.outputs.has_prompt_config != 'true' && steps.detect.outputs.has_prompt_assets != 'true' && steps.detect.outputs.has_llm_sdk != 'true'
        run: echo "No LLM or prompt surface detected; prompt injection scanning is not required yet."

      - name: Enforce prompt scan setup once LLM surface appears
        if: steps.detect.outputs.has_prompt_config != 'true' && (steps.detect.outputs.has_prompt_assets == 'true' || steps.detect.outputs.has_llm_sdk == 'true')
        run: |
          echo "Prompt injection scanning is required once prompt assets or LLM SDKs are introduced."
          echo "Add .promptfoo-code-scan.yaml and the PROMPTFOO_API_KEY repository secret,"
          echo "or install the Promptfoo Scanner GitHub App for repository-native PR scanning."
          exit 1

      - name: Fail when Promptfoo secret is missing
        if: steps.detect.outputs.has_prompt_config == 'true' && secrets.PROMPTFOO_API_KEY == ''
        run: |
          echo "PROMPTFOO_API_KEY is required to run prompt injection scanning."
          exit 1

      - name: Run Promptfoo code scan
        if: steps.detect.outputs.has_prompt_config == 'true' && secrets.PROMPTFOO_API_KEY != ''
        uses: promptfoo/code-scan-action@v1
        env:
          PROMPTFOO_API_KEY: ${{ secrets.PROMPTFOO_API_KEY }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          min-severity: medium

  codeql:
    name: codeql (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
          - actions
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@v4
